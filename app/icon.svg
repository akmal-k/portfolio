<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>akmal.tech favicon</title>
  <style>
    .bg      { fill: #0f0f0f; }
    .border  { stroke: #2a2a2a; }
    .grid    { stroke: #1c1c1c; }
    .ltr     { fill: #f0f0f0; }
    .bar     { fill: #333333; }
    @media (prefers-color-scheme: light) {
      .bg      { fill: #fafafa; }
      .border  { stroke: #e0e0e0; }
      .grid    { stroke: #ebebeb; }
      .ltr     { fill: #111111; }
      .bar     { fill: #cccccc; }
    }
  </style>

  <rect width="32" height="32" rx="6" class="bg"/>
  <line x1="0"  y1="11" x2="32" y2="11" class="grid" stroke-width="0.6"/>
  <line x1="0"  y1="21" x2="32" y2="21" class="grid" stroke-width="0.6"/>
  <line x1="11" y1="0"  x2="11" y2="32" class="grid" stroke-width="0.6"/>
  <line x1="21" y1="0"  x2="21" y2="32" class="grid" stroke-width="0.6"/>
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="5.5" fill="none" class="border" stroke-width="0.8"/>
  <text x="16" y="24" font-family="'Courier New',Courier,monospace" font-size="20" font-weight="700" class="ltr" text-anchor="middle">A</text>
  <rect x="8" y="26" width="16" height="1.5" rx="0.5" class="bar"/>
</svg>
